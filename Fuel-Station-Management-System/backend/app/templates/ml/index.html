<!DOCTYPE html>
<html>
<head>
    <title>Tank Prediction</title>
</head>
<body>

<h2>Tank empty prediction</h2>

<select id="tank">
    {% for k, v in tanks.items() %}
    <option value="{{ k }}">{{ v.name }} ({{ v.fuel_type }})</option>
    {% endfor %}
</select>

<input type="number" id="fuel" placeholder="Current fuel level">

<button onclick="predict()">Predict</button>

<pre id="result"></pre>

<script>
function predict() {

    fetch("/ml/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            tank_id: document.getElementById("tank").value,
            fuel_level: document.getElementById("fuel").value
        })
    })
    .then(r => r.json())
    .then(d => {
        document.getElementById("result").innerText =
            JSON.stringify(d, null, 2);
    });
}
</script>

</body>
</html>
